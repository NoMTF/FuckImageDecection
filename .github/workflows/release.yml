name: Build downloads

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  web:
    name: Web package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check Workers site
        run: npm run check

      - name: Pack web app
        run: |
          mkdir -p release
          zip -r release/ImagePrivacyTool-Web.zip \
            workers-site \
            wrangler.jsonc \
            package.json \
            package-lock.json \
            README.md \
            LICENSE \
            .nvmrc

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImagePrivacyTool-Web
          path: release/ImagePrivacyTool-Web.zip
          if-no-files-found: error

  desktop:
    name: Desktop ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            package: ImagePrivacyTool-Windows.zip
          - name: Linux
            os: ubuntu-latest
            package: ImagePrivacyTool-Linux.tar.gz
          - name: macOS
            os: macos-latest
            package: ImagePrivacyTool-macOS.zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Linux GUI build libs
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Build Windows executable
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m PyInstaller --clean --noconfirm --onefile --windowed --name ImagePrivacyTool --collect-data customtkinter --hidden-import PIL._tkinter_finder image_privacy_tool.py
          New-Item -ItemType Directory -Force release | Out-Null
          Compress-Archive -Path dist\ImagePrivacyTool.exe -DestinationPath release\ImagePrivacyTool-Windows.zip -Force

      - name: Build Linux binary
        if: runner.os == 'Linux'
        run: |
          python -m PyInstaller --clean --noconfirm --onefile --name ImagePrivacyTool --collect-data customtkinter --hidden-import PIL._tkinter_finder image_privacy_tool.py
          mkdir -p release
          tar -C dist -czf release/ImagePrivacyTool-Linux.tar.gz ImagePrivacyTool

      - name: Build macOS app
        if: runner.os == 'macOS'
        run: |
          python -m PyInstaller --clean --noconfirm --windowed --name ImagePrivacyTool --collect-data customtkinter --hidden-import PIL._tkinter_finder image_privacy_tool.py
          mkdir -p release
          ditto -c -k --sequesterRsrc --keepParent dist/ImagePrivacyTool.app release/ImagePrivacyTool-macOS.zip

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}
          path: release/${{ matrix.package }}
          if-no-files-found: error

  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Android build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            build-essential \
            git \
            libffi-dev \
            libssl-dev \
            libtool \
            openjdk-17-jdk \
            pkg-config \
            unzip \
            zip \
            zlib1g-dev
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install "cython<3" buildozer

      - name: Build debug APK
        run: |
          cp core.py mobile/core.py
          cd mobile
          buildozer -v android debug
          mkdir -p ../release
          cp "$(ls -1 bin/*.apk | head -n 1)" ../release/ImagePrivacyTool-Android.apk

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImagePrivacyTool-Android.apk
          path: release/ImagePrivacyTool-Android.apk
          if-no-files-found: error

  publish:
    name: Publish latest release
    runs-on: ubuntu-latest
    needs:
      - web
      - desktop
      - android
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Move latest tag
        run: |
          git tag -f latest "$GITHUB_SHA"
          git push -f origin refs/tags/latest

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Image Privacy Tool latest
          make_latest: true
          overwrite_files: true
          files: release-assets/*
          fail_on_unmatched_files: true
          body: |
            自动构建的最新版下载包。

            - Windows: ImagePrivacyTool-Windows.zip
            - Linux: ImagePrivacyTool-Linux.tar.gz
            - macOS: ImagePrivacyTool-macOS.zip
            - Android: ImagePrivacyTool-Android.apk
            - Web/Workers: ImagePrivacyTool-Web.zip
