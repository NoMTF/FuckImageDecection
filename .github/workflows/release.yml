name: Build & Commit Binaries

on:
  workflow_dispatch:           # 手动触发
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Windows .exe
  # ─────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: PyInstaller
        run: |
          pyinstaller --onefile --windowed --name "ImagePrivacyTool" `
            --add-data "core.py;." `
            image_privacy_tool.py

      - name: Zip
        run: powershell Compress-Archive dist\ImagePrivacyTool.exe ImagePrivacyTool-Windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: ImagePrivacyTool-Windows.zip

  # ─────────────────────────────────────────────────────────────────
  # Linux binary
  # ─────────────────────────────────────────────────────────────────
  build-linux:
    name: Linux
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: System libs
        run: sudo apt-get install -y python3-tk python3-dev -qq

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: PyInstaller
        run: |
          pyinstaller --onefile --name "ImagePrivacyTool" \
            --add-data "core.py:." \
            image_privacy_tool.py

      - name: Tar
        run: tar czf ImagePrivacyTool-Linux.tar.gz -C dist ImagePrivacyTool

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: ImagePrivacyTool-Linux.tar.gz

  # ─────────────────────────────────────────────────────────────────
  # macOS .app
  # ─────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: PyInstaller
        run: |
          pyinstaller --onefile --windowed --name "ImagePrivacyTool" \
            --add-data "core.py:." \
            image_privacy_tool.py

      - name: Zip
        run: zip -r ImagePrivacyTool-macOS.zip dist/ImagePrivacyTool.app

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: ImagePrivacyTool-macOS.zip

  # ─────────────────────────────────────────────────────────────────
  # Android APK
  # ─────────────────────────────────────────────────────────────────
  build-android:
    name: Android
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: System deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip \
            autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev

      - name: Buildozer + Cython
        run: pip install buildozer cython

      - name: Copy core into mobile dir
        run: cp core.py mobile/

      - name: Build APK
        working-directory: mobile
        run: buildozer android debug 2>&1 | tail -60

      - name: Collect APK
        run: |
          APK=$(find mobile/bin -name "*.apk" | head -1)
          cp "$APK" ImagePrivacyTool-Android.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: ImagePrivacyTool-Android.apk

  # ─────────────────────────────────────────────────────────────────
  # 把所有产物直接 commit 进仓库 dist/ 目录
  # ─────────────────────────────────────────────────────────────────
  commit-dist:
    name: Commit to dist/
    needs: [build-windows, build-linux, build-macos, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect into dist/
        run: |
          mkdir -p dist
          cp artifacts/windows/ImagePrivacyTool-Windows.zip  dist/
          cp artifacts/linux/ImagePrivacyTool-Linux.tar.gz   dist/
          cp artifacts/macos/ImagePrivacyTool-macOS.zip      dist/
          cp artifacts/android/ImagePrivacyTool-Android.apk  dist/

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          git diff --cached --quiet && echo "nothing to commit" && exit 0
          git commit -m "ci: update prebuilt binaries [skip ci]"
          git push origin HEAD:main
