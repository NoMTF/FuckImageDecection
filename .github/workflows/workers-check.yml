name: Workers static site check

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check static Workers build
        run: npm run check

      - name: Pack web version
        run: |
          zip -r image-metadata-editor-web.zip \
            workers-site \
            wrangler.jsonc \
            package.json \
            package-lock.json \
            README.md \
            LICENSE \
            .nvmrc

      - name: Upload web package
        uses: actions/upload-artifact@v4
        with:
          name: image-metadata-editor-web
          path: image-metadata-editor-web.zip
          if-no-files-found: error
